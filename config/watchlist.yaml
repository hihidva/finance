# Watchlist for finance-bot
#
# Strategy chốt: swing/position trading trên khung 1D, vị thế vài tuần đến vài tháng.
# Một số asset chỉ dùng làm bối cảnh vĩ mô (context_only=true) → KHÔNG sinh signal độc lập,
# chỉ feed vào prompt LLM khi phân tích các asset chính.
#
# asset_class:
#   vn_stock  -> source=vnstock,  symbol HOSE/HNX/UPCOM
#   crypto    -> source=ccxt,     symbol pair Binance (vd: BTC/USDT)
#   commodity -> source=yfinance, symbol futures/spot (XAUUSD=X, CL=F)
#   fx_index  -> source=yfinance, symbol index (DX-Y.NYB)

assets:
  # === Cổ phiếu VN — primary signal targets ===
  - symbol: FPT
    name: FPT Corporation
    asset_class: vn_stock
    source: vnstock
    exchange: HOSE
    timeframes: [1d]

  - symbol: HPG
    name: Hoa Phat Group
    asset_class: vn_stock
    source: vnstock
    exchange: HOSE
    timeframes: [1d]

  - symbol: MSN
    name: Masan Group
    asset_class: vn_stock
    source: vnstock
    exchange: HOSE
    timeframes: [1d]

  - symbol: MBS
    name: MB Securities
    asset_class: vn_stock
    source: vnstock
    exchange: HNX
    timeframes: [1d]

  - symbol: MBB
    name: MB Bank
    asset_class: vn_stock
    source: vnstock
    exchange: HOSE
    timeframes: [1d]

  # === BTC — primary signal target ===
  - symbol: BTC/USDT
    name: Bitcoin
    asset_class: crypto
    source: ccxt
    exchange: binance
    timeframes: [1d]

  # === Vàng quốc tế — primary signal target ===
  - symbol: XAUUSD=X
    name: Gold spot (XAU/USD, international)
    asset_class: commodity
    source: yfinance
    timeframes: [1d]

  # === WTI + DXY — context vĩ mô, không sinh signal ===
  - symbol: CL=F
    name: WTI Crude Oil (macro context only)
    asset_class: commodity
    source: yfinance
    timeframes: [1d]
    context_only: true

  - symbol: DX-Y.NYB
    name: US Dollar Index (macro context only)
    asset_class: fx_index
    source: yfinance
    timeframes: [1d]
    context_only: true

  # ^IRX = 13-week US Treasury Bill yield, used as a daily proxy for BOTH
  # the FED policy rate (Fed Funds Rate tracks short T-Bill yields closely)
  # AND the short end of the UST curve. asset_class=fx_index is a deliberate
  # reuse: the class is the closest existing bucket for "macro non-equity index"
  # (DXY lives here too). Never alerts because context_only=true.
  - symbol: ^IRX
    name: US 13W T-Bill yield (FED rate & short-end UST proxy, macro context only)
    asset_class: fx_index
    source: yfinance
    timeframes: [1d]
    context_only: true

