# Signal thresholds — Tier A "Strong" only (theo quyết định của user)
# - Tier A: alert + ghi DB
# - Tier B/C: chỉ ghi DB, không alert
#
# Ngưỡng đồng thuận TÍNH THEO TỶ LỆ (`agree_count / total_votes`) để tự co dãn khi
# rule engine thêm/bớt indicator — không phụ thuộc số tuyệt đối.
signal:
  tier_a:
    min_agree_ratio: 0.60              # ≥ 60% indicators đồng thuận
    min_confidence: 0.75
    require_news_not_against: true
  tier_b:
    min_agree_ratio: 0.45              # ≥ 45% indicators đồng thuận
    min_confidence: 0.60
  cooldown_hours_per_ticker: 24       # tối đa 1 alert/ngày/ticker
  default_horizon_days: 30            # vị thế swing/position điển hình

# Risk management — bot tự gợi ý SL/TP từ ATR + S/R
risk:
  atr_period: 14
  stop_loss_atr_mult: 2.0             # SL = entry - 2*ATR (long)
  take_profit_rr: 2.5                 # R:R = 1:2.5
  use_recent_swing_for_sr: true       # ưu tiên S/R gần nhất nếu hợp lý

# Schedule — VN-friendly (giờ Hà Nội = UTC+7)
schedule:
  vn_eod_close_local: "15:15"         # fetch EOD VN sau khi market đóng (14:45)
  global_eod_local: "06:00"           # fetch BTC/XAU/WTI/DXY sáng hôm sau
  signal_run_local: "16:00"           # phân tích & gửi alert sau khi data ready
  timezone: "Asia/Ho_Chi_Minh"
